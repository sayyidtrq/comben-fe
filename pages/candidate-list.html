<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate List - COMBEN</title>
  <meta name="breadcrumb" content="Recruitment &amp; Onboarding > Candidate List">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath d='M24 3 42 13.5v21L24 45 6 34.5v-21L24 3Z' fill='%2312B9C3'/%3E%3Cpath d='M24 12.2 34.5 18.3v12.2L24 36.7l-10.5-6.2V18.3L24 12.2Z' fill='%23F8FBFD'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="../css/recruitment-pipeline.css">
  <link rel="stylesheet" href="../css/candidates.css?v=20260709e">
</head>
<body>
  <aside class="sidebar"></aside>

  <div class="app-shell">
    <header class="topbar"></header>

    <main class="page-main candidate-page candidate-list-page" data-candidate-list-page>
      <section class="candidate-page-head">
        <div>
          <h1>Candidate List</h1>
          <p>Kelola kandidat, status rekrutmen, dokumen, dan aksi berikutnya dalam satu daftar.</p>
        </div>
        <button class="candidate-primary" type="button" data-open-add-candidate>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
          Tambah Kandidat
        </button>
      </section>
    
      <section class="candidate-toolbar candidate-toolbar-wide" aria-label="Filter kandidat">
        <label class="pipeline-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="search" data-candidate-search placeholder="Cari kandidat, ID, email, atau cabang..."><span class="search-shortcut">⌘ K</span></label>
        <label class="pipeline-filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h7"/><path d="m15 15 2 2 4-4"/></svg><span class="filter-copy"><small>Tahap</small><select data-candidate-stage><option value="all">Semua Tahap</option><option value="new-applicant">New Applicant</option><option value="screening">Screening</option><option value="interview">Interview</option><option value="verification">Verification</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></span></label>
        <label class="pipeline-filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg><span class="filter-copy"><small>Cabang</small><select data-candidate-branch><option value="all">Semua Cabang</option><option value="jakarta-selatan">Jakarta Selatan</option><option value="bandung">Bandung</option><option value="surabaya">Surabaya</option><option value="bali">Bali</option><option value="makassar">Makassar</option><option value="medan">Medan</option></select></span></label>
        <label class="pipeline-filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg><span class="filter-copy"><small>Status</small><select data-candidate-status><option value="all">Semua Status</option><option value="active">Aktif</option><option value="revision">Butuh Revisi</option><option value="done">Selesai</option><option value="rejected">Rejected</option></select></span></label>
        <button class="pipeline-action" type="button" data-reset-candidates>Reset</button>
      </section>
    
      <section class="candidate-summary-grid" data-candidate-summary></section>
      <section class="candidate-list-grid candidate-list-grid-large" data-candidate-grid></section>
      <div class="candidate-empty" data-candidate-empty hidden>Tidak ada kandidat yang cocok dengan filter.</div>
  <div class="candidate-pagination" data-candidate-pagination></div>
    
      <div class="candidate-modal-card" data-candidate-modal hidden><section class="candidate-modal-content"><div class="candidate-panel-head"><h2 data-modal-title>Detail</h2><button class="candidate-modal-close" type="button" data-close-modal>×</button></div><div data-modal-body></div></section></div>
      <div class="pipeline-toast" data-candidate-toast></div>
    </main>
  </div>

  <script src="../js/layout-loader.js"></script>
  <script src="../js/main.js?v=20260709c"></script>
  <script src="../js/recruitment-pipeline.js?v=20260709c"></script>
  <script src="../js/candidates.js?v=20260709f"></script>
</body>
</html>
